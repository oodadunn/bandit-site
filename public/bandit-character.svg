<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Dark circular badge background -->
  <circle cx="120" cy="120" r="118" fill="#0F0F0F"/>

  <!-- Outer decorative ring -->
  <circle cx="120" cy="120" r="115" fill="none" stroke="#39FF14" stroke-width="1.5" opacity="0.35"/>
  <circle cx="120" cy="120" r="110" fill="none" stroke="#39FF14" stroke-width="0.5" opacity="0.15"/>

  <!-- Fur texture ring (jagged polygon) -->
  <polygon
    points="120,68 130.1,80.7 144.6,71.4 149,85.9 166.3,81.1 164.4,95.7 182.4,96 174.5,109 190.9,114.3 178,124 190.9,133.7 174.5,139 182.4,152 164.4,152.3 166.3,166.9 149,162.1 144.6,176.6 130.1,167.3 120,180 109.9,167.3 95.4,176.6 91,162.1 73.7,166.9 75.6,152.3 57.6,152 65.5,139 49.1,133.7 62,124 49.1,114.3 65.5,109 57.6,96 75.6,95.7 73.7,81.1 91,85.9 95.4,71.4 109.9,80.7"
    fill="#C0B298"/>

  <!-- Left ear (rounded, top-center area) -->
  <ellipse cx="90" cy="76" rx="26" ry="22" fill="#BFAD93"/>
  <ellipse cx="90" cy="78" rx="16" ry="14" fill="#7A5A38"/>

  <!-- Right ear -->
  <ellipse cx="150" cy="76" rx="26" ry="22" fill="#BFAD93"/>
  <ellipse cx="150" cy="78" rx="16" ry="14" fill="#7A5A38"/>

  <!-- Main face oval (wide, cream) -->
  <ellipse cx="120" cy="128" rx="60" ry="45" fill="#EDE2CC"/>

  <!-- Cheek fur patches (subtle texture) -->
  <ellipse cx="78" cy="138" rx="18" ry="14" fill="#D9CDB5" opacity="0.5"/>
  <ellipse cx="162" cy="138" rx="18" ry="14" fill="#D9CDB5" opacity="0.5"/>

  <!-- Dark eye mask (wide, angry, spans full face) -->
  <path d="M62 108 Q120 94 178 108 L178 130 Q120 142 62 130 Z" fill="#111111"/>

  <!-- Left eye white (angled inward \) -->
  <ellipse cx="90" cy="117" rx="18" ry="11" fill="#F5EFE0" transform="rotate(-14, 90, 117)"/>

  <!-- Right eye white (angled inward /) -->
  <ellipse cx="150" cy="117" rx="18" ry="11" fill="#F5EFE0" transform="rotate(14, 150, 117)"/>

  <!-- Eye pupils -->
  <ellipse cx="90" cy="117" rx="7" ry="6" fill="#0A0A0A" transform="rotate(-14, 90, 117)"/>
  <ellipse cx="150" cy="117" rx="7" ry="6" fill="#0A0A0A" transform="rotate(14, 150, 117)"/>

  <!-- Eye shine dots -->
  <circle cx="86" cy="113" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="146" cy="113" r="2.5" fill="white" opacity="0.7"/>

  <!-- Muzzle (lower face area) -->
  <ellipse cx="120" cy="150" rx="34" ry="23" fill="#D9CBAF"/>

  <!-- Heart-shaped nose -->
  <path d="
    M120 148
    C115 146 107 142 107 136
    C107 131 111 129 115.5 131
    C117.5 131.8 120 134 120 134
    C120 134 122.5 131.8 124.5 131
    C129 129 133 131 133 136
    C133 142 125 146 120 148 Z"
    fill="#111111"/>

  <!-- Smile lines / cheek lines (subtle) -->
  <path d="M98 152 Q110 158 120 155 Q130 158 142 152" stroke="#B8A888" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Green recycling symbol at bottom of badge -->
  <text x="120" y="210" text-anchor="middle" font-size="28" fill="#39FF14" font-family="Arial" font-weight="bold" opacity="0.7">♻</text>

  <!-- Inner glow ring -->
  <circle cx="120" cy="120" r="117" fill="none" stroke="#39FF14" stroke-width="0.5" opacity="0.08"/>

</svg>
