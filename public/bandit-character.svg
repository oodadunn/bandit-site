<svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- TAIL (behind body) -->
  <path d="M148,200 C175,195 192,175 188,155 C184,135 168,128 155,138 C148,143 146,152 150,160 C154,168 162,168 165,162 C168,156 164,150 158,150" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Tail stripes -->
  <path d="M148,200 C175,195 192,175 188,155 C184,135 168,128 155,138 C148,143 146,152 150,160 C154,168 162,168 165,162 C168,156 164,150 158,150" stroke="#0A0A0A" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 8" fill="none" opacity="0.6"/>

  <!-- BODY -->
  <ellipse cx="100" cy="185" rx="52" ry="58" fill="#FFFFFF"/>
  <!-- Belly (lighter inner oval) -->
  <ellipse cx="100" cy="192" rx="30" ry="36" fill="#E8E8E8" opacity="0.5"/>

  <!-- LEFT ARM -->
  <path d="M52,165 C38,160 28,150 30,138 C32,128 44,125 52,132" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Left hand/paw -->
  <circle cx="30" cy="138" r="10" fill="#FFFFFF"/>
  <path d="M22,132 Q30,128 38,132" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- RIGHT ARM (holding something — a crushed can, raised) -->
  <path d="M148,165 C162,158 172,145 168,133 C165,123 153,121 147,129" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Right paw -->
  <circle cx="170" cy="130" r="10" fill="#FFFFFF"/>
  <!-- Thumbs-up on right paw for recycling -->
  <path d="M163,125 Q170,120 177,125" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- LEGS/FEET -->
  <ellipse cx="82" cy="238" rx="18" ry="10" fill="#FFFFFF"/>
  <ellipse cx="118" cy="238" rx="18" ry="10" fill="#FFFFFF"/>
  <!-- Toe lines -->
  <path d="M70,238 Q82,234 94,238" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M106,238 Q118,234 130,238" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- NECK -->
  <rect x="88" y="118" width="24" height="20" rx="8" fill="#FFFFFF"/>

  <!-- HEAD (white silhouette with ear bumps) -->
  <path fill="#FFFFFF" d="
    M100,22
    L87,17 L70,12 L74,30
    L62,38
    L58,52 L63,60 L57,70
    L65,92
    C72,108 85,116 100,116
    C115,108 128,108 135,92
    L143,70
    L137,60 L142,52
    L138,38
    L126,30 L130,12 L113,17
    Z
  "/>

  <!-- Inner ears (dark) -->
  <polygon fill="#0A0A0A" points="70,16 64,32 78,32"/>
  <polygon fill="#0A0A0A" points="130,16 136,32 122,32"/>

  <!-- Eye mask with center spike -->
  <path fill="#0A0A0A" d="
    M100,38
    L94,47 L62,47
    L58,54 L60,64
    L68,70 L78,63 L86,74
    L100,78
    L114,74 L122,63 L132,70
    L140,64 L142,54
    L138,47 L106,47
    Z
  "/>

  <!-- Eye slits (white) -->
  <polygon fill="#FFFFFF" points="65,59 78,53 82,60 69,66"/>
  <polygon fill="#FFFFFF" points="135,59 122,53 118,60 131,66"/>

  <!-- Muzzle (white) -->
  <circle fill="#FFFFFF" cx="100" cy="96" r="18"/>

  <!-- Nose (dark oval) -->
  <ellipse fill="#0A0A0A" cx="100" cy="99" rx="6" ry="5"/>

  <!-- Smile lines (smug grin) -->
  <path d="M88,106 Q100,114 112,106" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Recycling symbol on chest (green) -->
  <text x="100" y="200" text-anchor="middle" font-size="28" fill="#39FF14" font-family="Arial" font-weight="bold">♻</text>

  <!-- Green glow halo behind head -->
  <circle cx="100" cy="65" r="62" fill="none" stroke="#39FF14" stroke-width="1" opacity="0.15"/>
  <circle cx="100" cy="65" r="70" fill="none" stroke="#39FF14" stroke-width="0.5" opacity="0.08"/>

</svg>
