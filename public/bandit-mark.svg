<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Dark circular badge background -->
  <circle cx="60" cy="60" r="59" fill="#0F0F0F"/>

  <!-- Green glow ring -->
  <circle cx="60" cy="60" r="57" fill="none" stroke="#39FF14" stroke-width="1" opacity="0.4"/>

  <!-- Fur texture ring (jagged polygon around face) -->
  <polygon
    points="60,34 65,40.3 72.3,35.7 74.5,42.9 83.1,40.6 82.2,47.9 91.2,48 87.3,54.5 95.5,57.1 89,62 95.5,66.9 87.3,69.5 91.2,76 82.2,76.1 83.1,83.4 74.5,81.1 72.3,88.3 65,83.7 60,90 55,83.7 47.7,88.3 45.5,81.1 36.9,83.4 37.8,76.1 28.8,76 32.7,69.5 24.5,66.9 31,62 24.5,57.1 32.7,54.5 28.8,48 37.8,47.9 36.9,40.6 45.5,42.9 47.7,35.7 55,40.3"
    fill="#C8BAA0"/>

  <!-- Left ear -->
  <ellipse cx="45" cy="37" rx="13" ry="11" fill="#C4B49C"/>
  <ellipse cx="45" cy="38" rx="8" ry="7" fill="#7A5C3E"/>

  <!-- Right ear -->
  <ellipse cx="75" cy="37" rx="13" ry="11" fill="#C4B49C"/>
  <ellipse cx="75" cy="38" rx="8" ry="7" fill="#7A5C3E"/>

  <!-- Main face oval (wide, cream-colored) -->
  <ellipse cx="60" cy="62" rx="30" ry="22" fill="#EDE3D0"/>

  <!-- Dark eye mask spanning full face width -->
  <path d="M30 52 Q60 45 90 52 L90 64 Q60 69 30 64 Z" fill="#111111"/>

  <!-- Left eye white (angled inward like \) -->
  <ellipse cx="44" cy="57" rx="9" ry="5.5" fill="#F5EFE0" transform="rotate(-14, 44, 57)"/>

  <!-- Right eye white (angled inward like /) -->
  <ellipse cx="76" cy="57" rx="9" ry="5.5" fill="#F5EFE0" transform="rotate(14, 76, 57)"/>

  <!-- Eye pupils -->
  <ellipse cx="44" cy="57" rx="3.5" ry="3" fill="#0A0A0A" transform="rotate(-14, 44, 57)"/>
  <ellipse cx="76" cy="57" rx="3.5" ry="3" fill="#0A0A0A" transform="rotate(14, 76, 57)"/>

  <!-- Muzzle (lower face) -->
  <ellipse cx="60" cy="73" rx="16" ry="11" fill="#DDD0B8"/>

  <!-- Heart-shaped nose -->
  <path d="M60 72 C57 70.5 53 68 53 65 C53 62.5 55 61 57.5 62 C59 62.5 60 64 60 64 C60 64 61 62.5 62.5 62 C65 61 67 62.5 67 65 C67 68 63 70.5 60 72 Z" fill="#111111"/>

</svg>
